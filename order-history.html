<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>我的訂單紀錄</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --primary: #35858E;
      --secondary: #7DA78C;
      --accent: #C2D099;
      --background: #E6EEC9;
      --surface: rgba(255, 255, 255, 0.92);
      --card: rgba(255, 255, 255, 0.86);
      --text: rgba(25, 30, 30, 0.9);
      --muted: rgba(25, 30, 30, 0.58);
      --border: rgba(125, 167, 140, 0.32);
      --danger: #e65b5b;
      --shadow: 0 14px 34px rgba(40, 70, 50, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(53,133,142,0.22), rgba(230,238,201,0.92)),
        var(--background);
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      color: white;
      padding: 20px 18px;
      box-shadow: 0 6px 22px rgba(0,0,0,0.12);
    }

    .header-inner {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .brand-title {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 0.4px;
    }

    .brand-subtitle {
      margin-top: 4px;
      font-size: 13px;
      opacity: 0.88;
      font-weight: 700;
    }

    .refresh-btn {
      border: 0;
      border-radius: 999px;
      padding: 11px 14px;
      background: rgba(255,255,255,0.2);
      color: white;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }

    main {
      max-width: 760px;
      margin: 18px auto;
      padding: 0 14px 32px;
    }

    .profile-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(53,133,142,0.15);
      object-fit: cover;
      flex-shrink: 0;
    }

    .profile-name {
      font-size: 18px;
      font-weight: 900;
    }

    .profile-sub {
      color: var(--muted);
      margin-top: 4px;
      font-size: 13px;
      font-weight: 700;
      word-break: break-all;
    }

    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .summary-label {
      color: var(--muted);
      font-weight: 800;
      font-size: 13px;
    }

    .summary-value {
      margin-top: 6px;
      font-size: 26px;
      font-weight: 950;
      color: var(--primary);
    }

    .toolbar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 12px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .search-input {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 13px 14px;
      font-size: 16px;
      outline: none;
      background: rgba(255,255,255,0.9);
      min-width: 0;
    }

    .status-pill {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 12px 14px;
      background: white;
      font-weight: 900;
      color: var(--primary);
      white-space: nowrap;
    }

    .loading,
    .empty,
    .error {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 34px 20px;
      text-align: center;
      color: var(--muted);
      font-weight: 900;
      box-shadow: var(--shadow);
    }

    .error {
      color: var(--danger);
    }

    .order-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .order-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .order-main {
      padding: 16px;
      cursor: pointer;
    }

    .order-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .order-id {
      font-size: 18px;
      font-weight: 950;
      line-height: 1.25;
    }

    .order-time {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      margin-top: 5px;
    }

    .order-total {
      color: var(--primary);
      font-size: 24px;
      font-weight: 950;
      white-space: nowrap;
    }

    .order-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .tag {
      border-radius: 999px;
      padding: 7px 10px;
      background: rgba(53,133,142,0.1);
      color: var(--primary);
      font-size: 13px;
      font-weight: 900;
    }

    .tag.gray {
      background: rgba(20,25,25,0.06);
      color: var(--muted);
    }

    .tag.done {
      background: rgba(125,167,140,0.18);
      color: #4f7b5f;
    }

    .items-preview {
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      line-height: 1.5;
    }

    .order-detail {
      display: none;
      border-top: 1px solid var(--border);
      padding: 14px 16px 16px;
      background: rgba(230,238,201,0.42);
    }

    .order-card.open .order-detail {
      display: block;
    }

    .detail-title {
      font-weight: 950;
      margin-bottom: 10px;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(125,167,140,0.18);
      font-weight: 800;
    }

    .item-row:last-child {
      border-bottom: 0;
    }

    .note-box {
      margin-top: 12px;
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.5;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      background: rgba(20,25,25,0.9);
      color: white;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: 900;
      display: none;
      z-index: 100;
      max-width: calc(100vw - 32px);
      text-align: center;
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 520px) {
      header {
        padding: 18px 14px;
      }

      .brand-title {
        font-size: 22px;
      }

      .refresh-btn {
        padding: 10px 12px;
        font-size: 14px;
      }

      main {
        margin-top: 14px;
      }

      .summary {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .summary-card {
        padding: 14px;
      }

      .summary-value {
        font-size: 24px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .status-pill {
        text-align: center;
      }

      .order-main {
        padding: 15px;
      }

      .order-id {
        font-size: 17px;
      }

      .order-total {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div>
        <div class="brand-title">我的訂單紀錄</div>
        <div class="brand-subtitle">好膽賣早｜LINE 會員查詢</div>
      </div>

      <button class="refresh-btn" onclick="loadOrders()">重新整理</button>
    </div>
  </header>

  <main>
    <section class="profile-card">
      <img id="profileAvatar" class="avatar" alt="LINE 頭貼" />
      <div>
        <div id="profileName" class="profile-name">讀取 LINE 資料中...</div>
        <div id="profileSub" class="profile-sub">請稍候</div>
      </div>
    </section>

    <section class="summary">
      <div class="summary-card">
        <div class="summary-label">訂單次數</div>
        <div class="summary-value"><span id="orderCount">0</span> 筆</div>
      </div>

      <div class="summary-card">
        <div class="summary-label">累計金額</div>
        <div class="summary-value">NT$<span id="totalAmount">0</span></div>
      </div>
    </section>

    <section class="toolbar">
      <input id="searchInput" class="search-input" placeholder="搜尋訂單編號、品項、狀態" oninput="renderOrders()" />
      <div id="statusText" class="status-pill">尚未載入</div>
    </section>

    <section id="orderArea">
      <div class="loading">正在取得會員訂單...</div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyQbOCgiwg31zZLHWhZDbgSutTfT7Jl34NgxoYkF58vJsLGCj92qA0V7dMGbSQ-KU02sQ/exec';
    const LIFF_ID = '2010033029-dbR9f20o';

    let lineProfile = {
      lineUserId: '',
      lineDisplayName: '',
      linePictureUrl: ''
    };

    let orders = [];

    async function init() {
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();

        lineProfile = {
          lineUserId: profile.userId || '',
          lineDisplayName: profile.displayName || '',
          linePictureUrl: profile.pictureUrl || ''
        };

        renderProfile();
        await loadOrders();

      } catch (error) {
        document.getElementById('orderArea').innerHTML =
          '<div class="error">LINE 初始化失敗：' + escapeHtml(error.message) + '</div>';
      }
    }

    function renderProfile() {
      document.getElementById('profileName').textContent = lineProfile.lineDisplayName || 'LINE 會員';
      document.getElementById('profileSub').textContent = lineProfile.lineUserId || '尚未取得 UserId';

      const avatar = document.getElementById('profileAvatar');
      if (lineProfile.linePictureUrl) {
        avatar.src = lineProfile.linePictureUrl;
      } else {
        avatar.removeAttribute('src');
      }
    }

    async function loadOrders() {
      if (!lineProfile.lineUserId) {
        showToast('尚未取得 LINE UserId');
        return;
      }

      const area = document.getElementById('orderArea');
      document.getElementById('statusText').textContent = '載入中';
      area.innerHTML = '<div class="loading">正在取得訂單紀錄...</div>';

      try {
        const data = await jsonp(
          API_URL +
          '?mode=getMyOrders&lineUserId=' +
          encodeURIComponent(lineProfile.lineUserId)
        );

        if (data.status !== 'success') {
          area.innerHTML = '<div class="error">' + escapeHtml(data.message || '讀取失敗') + '</div>';
          document.getElementById('statusText').textContent = '讀取失敗';
          return;
        }

        orders = data.orders || [];

        document.getElementById('orderCount').textContent = orders.length;
        document.getElementById('totalAmount').textContent = orders.reduce((sum, order) => {
          return sum + Number(order.total || 0);
        }, 0);

        document.getElementById('statusText').textContent = '已載入 ' + orders.length + ' 筆';

        renderOrders();

      } catch (error) {
        area.innerHTML = '<div class="error">讀取失敗：' + escapeHtml(error.message) + '</div>';
        document.getElementById('statusText').textContent = '讀取失敗';
      }
    }

    function renderOrders() {
      const area = document.getElementById('orderArea');
      const keyword = document.getElementById('searchInput').value.trim().toLowerCase();

      const filtered = orders.filter(order => {
        if (!keyword) return true;

        const itemText = (order.items || []).map(item => item.name).join(' ');
        const text = [
          order.orderId,
          order.status,
          order.source,
          order.paymentMethod,
          order.pickupTime,
          itemText
        ].join(' ').toLowerCase();

        return text.includes(keyword);
      });

      if (filtered.length === 0) {
        area.innerHTML = '<div class="empty">目前沒有符合的訂單</div>';
        return;
      }

      area.innerHTML = `
        <div class="order-list">
          ${filtered.map((order, index) => renderOrderCard(order, index)).join('')}
        </div>
      `;
    }

    function renderOrderCard(order, index) {
      const items = order.items || [];
      const preview = items.length > 0
        ? items.slice(0, 4).map(item => `${escapeHtml(item.name)} x ${Number(item.quantity || 0)}`).join('、')
        : '無品項明細';

      const moreText = items.length > 4 ? ` 等 ${items.length} 項` : '';

      const statusClass = order.status === '已取餐' ? 'done' : 'gray';

      return `
        <article class="order-card" id="orderCard-${index}">
          <div class="order-main" onclick="toggleDetail(${index})">
            <div class="order-top">
              <div>
                <div class="order-id">${escapeHtml(order.orderId || '未命名訂單')}</div>
                <div class="order-time">${escapeHtml(order.createdAt || '')}</div>
              </div>
              <div class="order-total">NT$${Number(order.total || 0)}</div>
            </div>

            <div class="order-tags">
              <span class="tag">${escapeHtml(order.source || 'WEB')}</span>
              <span class="tag gray">${escapeHtml(order.paymentMethod || '未填付款')}</span>
              <span class="tag ${statusClass}">${escapeHtml(order.status || '未取餐')}</span>
            </div>

            <div class="items-preview">${preview}${moreText}</div>
          </div>

          <div class="order-detail">
            <div class="detail-title">訂單明細</div>

            ${items.length > 0 ? items.map(item => `
              <div class="item-row">
                <span>${escapeHtml(item.name)}</span>
                <span>x ${Number(item.quantity || 0)}</span>
              </div>
            `).join('') : '<div class="item-row"><span>無品項明細</span><span></span></div>'}

            <div class="note-box">
              <div>取餐時間：${escapeHtml(order.pickupTime || '未填')}</div>
              <div>備註：${escapeHtml(order.note || '無')}</div>
            </div>
          </div>
        </article>
      `;
    }

    function toggleDetail(index) {
      const card = document.getElementById('orderCard-' + index);
      if (!card) return;
      card.classList.toggle('open');
    }

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = 'jsonpCallback_' + Date.now() + '_' + Math.floor(Math.random() * 10000);

        window[callbackName] = function(data) {
          delete window[callbackName];
          script.remove();
          resolve(data);
        };

        const script = document.createElement('script');
        script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callbackName;

        script.onerror = function() {
          delete window[callbackName];
          script.remove();
          reject(new Error('連線失敗'));
        };

        document.body.appendChild(script);
      });
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');

      setTimeout(() => {
        toast.classList.remove('show');
      }, 1600);
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    init();
  </script>
</body>
</html>
