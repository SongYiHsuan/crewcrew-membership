<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrewCrew 會員優惠發送</title>
  <style>
    :root {
      --primary: #35858E;
      --secondary: #7DA78C;
      --accent: #C2D099;
      --background: #E6EEC9;
      --surface: rgba(255, 255, 255, 0.88);
      --card: rgba(255, 255, 255, 0.76);
      --text: rgba(20, 25, 25, 0.88);
      --muted: rgba(20, 25, 25, 0.56);
      --border: rgba(125, 167, 140, 0.34);
      --danger: #d9534f;
      --shadow: 0 14px 34px rgba(20, 25, 25, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(53,133,142,0.20), transparent 32%),
        linear-gradient(180deg, rgba(53,133,142,0.18), rgba(230,238,201,0.92)),
        var(--background);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      color: white;
      padding: 20px 18px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.12);
    }

    .header-inner {
      max-width: 1180px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand-title {
      font-size: 24px;
      font-weight: 950;
      letter-spacing: 0.5px;
    }

    .brand-subtitle {
      margin-top: 5px;
      opacity: 0.88;
      font-size: 13px;
      font-weight: 700;
    }

    .header-pill {
      border: 1px solid rgba(255,255,255,0.36);
      background: rgba(255,255,255,0.18);
      color: white;
      border-radius: 999px;
      padding: 11px 14px;
      font-weight: 900;
      white-space: nowrap;
    }

    main {
      max-width: 1180px;
      margin: 22px auto;
      padding: 0 16px 40px;
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    
    .panel-body {
      padding: 18px;
    }
    
    .condition-panel {
      position: sticky;
      top: 16px;
      max-height: calc(100vh - 32px);
      display: flex;
      flex-direction: column;
    }
    
    .condition-panel .panel-body {
      overflow: auto;
      padding-bottom: 0;
    }
    
    .condition-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    
    .condition-grid .field {
      margin-bottom: 0;
    }
    
    .span-2 {
      grid-column: 1 / -1;
    }
    
    .fixed-action-area {
      position: sticky;
      bottom: 0;
      z-index: 8;
      margin: 18px -18px 0;
      padding: 12px 18px 16px;
      background: linear-gradient(
        180deg,
        rgba(230,238,201,0.72),
        rgba(230,238,201,0.96)
      );
      border-top: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }
    
    .fixed-action-area .btn-row {
      margin-top: 0;
    }
    
    .fixed-action-area .btn-row + .btn-row {
      margin-top: 10px;
    }
    .panel-title {
      font-size: 20px;
      font-weight: 950;
      margin-bottom: 12px;
      color: var(--primary);
    }

    .section-title {
      font-size: 14px;
      font-weight: 950;
      color: var(--muted);
      margin: 18px 0 9px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 900;
      color: var(--muted);
      margin: 0 0 6px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 13px;
      font-size: 15px;
      outline: none;
      color: var(--text);
      background: rgba(255,255,255,0.88);
      font-family: inherit;
    }

    textarea { resize: vertical; min-height: 82px; }

    .field { margin-bottom: 10px; }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: 0;
      border-radius: 15px;
      padding: 13px 14px;
      font-size: 15px;
      font-weight: 950;
      cursor: pointer;
      font-family: inherit;
    }

    .primary-btn { background: var(--primary); color: white; }
    .secondary-btn { background: rgba(255,255,255,0.8); color: var(--text); border: 1px solid var(--border); }
    .danger-btn { background: rgba(217,83,79,0.12); color: var(--danger); border: 1px solid rgba(217,83,79,0.22); }

    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .summary-cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(230,238,201,0.46);
    }

    .summary-card {
      background: rgba(255,255,255,0.74);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
    }

    .summary-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .summary-value {
      margin-top: 6px;
      color: var(--primary);
      font-size: 24px;
      font-weight: 950;
    }

    .toolbar {
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .toolbar-left {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .mini-input { max-width: 220px; }

    .member-list {
      max-height: calc(100vh - 314px);
      min-height: 420px;
      overflow: auto;
      padding: 10px 14px 14px;
    }

    .member-card {
      display: grid;
      grid-template-columns: 34px 1fr auto;
      gap: 12px;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 13px;
      margin-bottom: 10px;
    }

    .member-name {
      font-size: 16px;
      font-weight: 950;
    }

    .member-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      line-height: 1.45;
    }

    .member-money {
      text-align: right;
      color: var(--primary);
      font-size: 18px;
      font-weight: 950;
      white-space: nowrap;
    }

    .member-count {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }

    .check {
      width: 22px;
      height: 22px;
      accent-color: var(--primary);
    }

    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 18px;
      font-weight: 900;
      padding: 70px 20px;
    }

    .preview-box {
      border: 1px dashed rgba(53,133,142,0.46);
      background: rgba(255,255,255,0.58);
      border-radius: 18px;
      padding: 14px;
      line-height: 1.65;
      font-weight: 760;
      color: var(--text);
      white-space: pre-wrap;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      max-width: calc(100vw - 32px);
      background: rgba(20,25,25,0.9);
      color: white;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: 900;
      display: none;
      z-index: 20;
      text-align: center;
    }

    .toast.show { display: block; }

    @media (max-width: 920px) {
      .condition-panel {
        position: static;
        max-height: none;
      }
      
      .condition-panel .panel-body {
        overflow: visible;
      }
      
      .condition-grid {
        grid-template-columns: 1fr;
      }
      
      .span-2 {
        grid-column: auto;
      }
      
      .fixed-action-area {
        position: sticky;
        bottom: 0;
      }
      main { grid-template-columns: 1fr; }
      .summary-cards { grid-template-columns: repeat(2, 1fr); }
      .member-list { max-height: none; min-height: 260px; }
    }

    @media (max-width: 520px) {
      .header-inner { align-items: flex-start; flex-direction: column; }
      .header-pill { width: 100%; text-align: center; }
      .grid-2, .btn-row { grid-template-columns: 1fr; }
      .summary-cards { grid-template-columns: 1fr 1fr; padding: 12px; }
      .toolbar { align-items: stretch; flex-direction: column; }
      .mini-input { max-width: none; }
      .member-card { grid-template-columns: 30px 1fr; }
      .member-money { grid-column: 2; text-align: left; }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div>
        <div class="brand-title">CrewCrew 會員優惠發送</div>
        <div class="brand-subtitle">依累計金額、消費次數、單筆金額篩選會員，發送 LINE 優惠兌換按鈕</div>
      </div>
      <div class="header-pill">crewcrew_membership</div>
    </div>
  </header>

  <main>
    <section class="panel condition-panel">
      <div class="panel-body">
        <div class="panel-title">發送條件</div>

        <div class="condition-grid">
          <div class="field span-2">
            <label>Apps Script Web App URL</label>
            <input id="apiUrl" placeholder="https://script.google.com/macros/s/AKfycbxMx3nz1hBA4pI4dfcHKo14zN3JS-Mj0i_TOzJSuR5prnB4CPRPdRGFomFDDuQQjRUDpg/exec" />
          </div>
        
          <div class="field span-2">
            <label>管理金鑰 adminKey</label>
            <input id="adminKey" placeholder="例如 crewcrew2026" type="password" />
          </div>
        </div>

        <div class="section-title">會員篩選</div>
          <div class="condition-grid">
          <div class="field">
            <label>累計金額大於等於</label>
            <input id="minAmount" type="number" min="0" placeholder="例如 1000" />
          </div>
          <div class="field">
            <label>累計金額小於等於</label>
            <input id="maxAmount" type="number" min="0" placeholder="可空白" />
          </div>
          <div class="field">
            <label>消費次數大於等於</label>
            <input id="minCount" type="number" min="0" placeholder="例如 3" />
          </div>
          <div class="field">
            <label>單筆金額大於等於</label>
            <input id="minSingleAmount" type="number" min="0" placeholder="例如 300" />
          </div>
          <div class="field">
            <label>最近幾天內有消費</label>
            <input id="lastDays" type="number" min="0" placeholder="例如 30" />
          </div>
          <div class="field">
            <label>姓名 / 電話搜尋</label>
            <input id="keyword" placeholder="可空白" />
          </div>
        </div>

        <div class="section-title">優惠訊息</div>

        <div class="condition-grid">
          <div class="field span-2">
            <label>優惠標題</label>
            <input id="couponTitle" value="好膽賣早專屬優惠" />
          </div>
        
          <div class="field span-2">
            <label>發送文字</label>
            <textarea id="message">感謝支持好膽賣早，本週憑此訊息享飲品折扣 10 元！</textarea>
          </div>
        
          <div class="field">
            <label>兌換按鈕文字</label>
            <input id="buttonLabel" value="兌換優惠" />
          </div>
        
          <div class="field">
            <label>效期文字</label>
            <input id="expireText" placeholder="例如 使用期限：2026/05/31 前" />
          </div>
        
          <div class="field span-2">
            <label>兌換頁網址 / LIFF URL</label>
            <input id="redeemUrl" placeholder="例如 https://liff.line.me/你的LIFFID 或 GitHub Pages 兌換頁" />
          </div>
        </div>

        <div class="section-title">LINE 預覽</div>
        <div class="preview-box" id="previewBox"></div>

        <div class="fixed-action-area">
        <div class="btn-row">
          <button class="secondary-btn" onclick="loadMembers()">查詢會員</button>
          <button class="primary-btn" onclick="sendSelectedCoupons()">發送給勾選會員</button>
        </div>
      
        <div class="btn-row">
          <button class="secondary-btn" onclick="saveSettings()">儲存設定</button>
          <button class="danger-btn" onclick="clearSelected()">取消勾選</button>
        </div>
      </div>
      </div>
    </section>

    <section class="panel">
      <div class="summary-cards">
        <div class="summary-card">
          <div class="summary-label">查詢結果</div>
          <div class="summary-value" id="targetCount">0</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">已勾選</div>
          <div class="summary-value" id="selectedCount">0</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">可發 LINE</div>
          <div class="summary-value" id="lineReadyCount">0</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">平均累計</div>
          <div class="summary-value" id="averageAmount">0</div>
        </div>
      </div>

      <div class="toolbar">
        <div class="toolbar-left">
          <button class="secondary-btn" onclick="toggleAll(true)">全選可發送</button>
          <button class="secondary-btn" onclick="toggleAll(false)">全不選</button>
        </div>
        <input class="mini-input" id="clientFilter" placeholder="畫面內搜尋" oninput="renderMembers()" />
      </div>

      <div id="memberList" class="member-list">
        <div class="empty">請先查詢會員</div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    const DEFAULT_API_URL = 'https://script.google.com/macros/s/AKfycbxMx3nz1hBA4pI4dfcHKo14zN3JS-Mj0i_TOzJSuR5prnB4CPRPdRGFomFDDuQQjRUDpg/exec';

    let members = [];
    let selectedKeys = new Set();

    function init() {
      const saved = JSON.parse(localStorage.getItem('crewcrew_membership_settings') || '{}');
      document.getElementById('apiUrl').value = saved.apiUrl || DEFAULT_API_URL;
      document.getElementById('adminKey').value = saved.adminKey || 'crewcrew2026';
      document.getElementById('redeemUrl').value = saved.redeemUrl || '';
      document.getElementById('couponTitle').value = saved.couponTitle || '好膽賣早專屬優惠';
      document.getElementById('buttonLabel').value = saved.buttonLabel || '兌換優惠';
      document.getElementById('expireText').value = saved.expireText || '';
      document.getElementById('message').value = saved.message || '感謝支持好膽賣早，本週憑此訊息享飲品折扣 10 元！';
      bindPreviewInputs();
      updatePreview();
      updateSummary();
    }

    function bindPreviewInputs() {
      ['couponTitle','message','buttonLabel','expireText','redeemUrl'].forEach(id => {
        document.getElementById(id).addEventListener('input', updatePreview);
      });
    }

    function saveSettings() {
      const data = {
        apiUrl: val('apiUrl'),
        adminKey: val('adminKey'),
        redeemUrl: val('redeemUrl'),
        couponTitle: val('couponTitle'),
        buttonLabel: val('buttonLabel'),
        expireText: val('expireText'),
        message: val('message')
      };
      localStorage.setItem('crewcrew_membership_settings', JSON.stringify(data));
      showToast('設定已儲存');
    }

    function updatePreview() {
      const title = val('couponTitle') || '好膽賣早專屬優惠';
      const message = val('message') || '';
      const expire = val('expireText') || '';
      const button = val('buttonLabel') || '兌換優惠';
    
      document.getElementById('previewBox').textContent =
        title + '\n\n' +
        message +
        (expire ? '\n\n' + expire : '') +
        '\n\n[' + button + ']';
    }

    function buildQuery(mode, extra = {}) {
      const params = {
        mode,
        adminKey: val('adminKey'),
        minAmount: val('minAmount'),
        maxAmount: val('maxAmount'),
        minCount: val('minCount'),
        minSingleAmount: val('minSingleAmount'),
        lastDays: val('lastDays'),
        q: val('keyword'),
        ...extra
      };

      return Object.keys(params)
        .filter(key => params[key] !== undefined && params[key] !== null && String(params[key]).trim() !== '')
        .map(key => encodeURIComponent(key) + '=' + encodeURIComponent(params[key]))
        .join('&');
    }

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = 'jsonp_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
        window[callbackName] = data => {
          delete window[callbackName];
          script.remove();
          resolve(data);
        };
        const script = document.createElement('script');
        script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callbackName;
        script.onerror = () => {
          delete window[callbackName];
          script.remove();
          reject(new Error('連線失敗'));
        };
        document.body.appendChild(script);
      });
    }

    async function loadMembers() {
      if (!val('apiUrl')) return showToast('請先填 Apps Script Web App URL');
      if (!val('adminKey')) return showToast('請先填 adminKey');

      saveSettings();
      const list = document.getElementById('memberList');
      list.innerHTML = '<div class="empty">查詢中...</div>';

      try {
        const url = val('apiUrl') + '?' + buildQuery('getMarketingMembers');
        const data = await jsonp(url);
        if (data.status !== 'success') {
          members = [];
          selectedKeys.clear();
          renderMembers();
          return showToast(data.message || '查詢失敗');
        }

        members = (data.members || []).map(normalizeMember);
        selectedKeys.clear();
        renderMembers();
        showToast('查詢完成，共 ' + members.length + ' 位');
      } catch (error) {
        members = [];
        selectedKeys.clear();
        renderMembers();
        showToast('查詢失敗：' + error.message);
      }
    }

    function normalizeMember(m) {
      const lineUserId = String(m.lineUserId || m.lineUserID || '').trim();
    
      return {
        key: lineUserId,
        name: m.name || m.customerName || '未命名',
        phone: m.phone || m.customerPhone || '',
        lineUserId: lineUserId,
        lineDisplayName: m.lineDisplayName || m.lineName || '',
        orderCount: Number(m.orderCount || m.count || 0),
        totalAmount: Number(m.totalAmount || m.amount || 0),
        maxSingleAmount: Number(m.maxSingleAmount || 0),
        lastOrderId: m.lastOrderId || m.recentOrderId || '',
        lastPurchaseTime: m.lastPurchaseTime || m.lastTime || ''
      };
    }

    function renderMembers() {
      const list = document.getElementById('memberList');
      const keyword = val('clientFilter').toLowerCase();
      const filtered = members.filter(m => {
        const text = [m.name, m.phone, m.lineDisplayName, m.lastOrderId].join(' ').toLowerCase();
        return !keyword || text.includes(keyword);
      });

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">沒有符合條件的會員</div>';
        updateSummary();
        return;
      }

      list.innerHTML = filtered.map(m => {
        const canSend = !!m.lineUserId;
        return `
          <div class="member-card">
            <input class="check" type="checkbox" ${selectedKeys.has(m.key) ? 'checked' : ''} ${canSend ? '' : 'disabled'} onchange="toggleMember('${escapeJs(m.key)}', this.checked)">
            <div>
              <div class="member-name">${escapeHtml(m.name)} ${canSend ? '' : '<span style="color:#d9534f;font-size:12px;">無 LINE UserId</span>'}</div>
              <div class="member-sub">
                電話：${escapeHtml(m.phone || '-')}｜LINE：${escapeHtml(m.lineDisplayName || '-')}
                <br>最近訂單：${escapeHtml(m.lastOrderId || '-')}｜最近消費：${escapeHtml(m.lastPurchaseTime || '-')}
              </div>
            </div>
            <div class="member-money">
              NT$${formatNumber(m.totalAmount)}
              <div class="member-count">${m.orderCount} 次｜單筆最高 NT$${formatNumber(m.maxSingleAmount)}</div>
            </div>
          </div>
        `;
      }).join('');

      updateSummary();
    }

    function toggleMember(key, checked) {
      if (checked) selectedKeys.add(key);
      else selectedKeys.delete(key);
      updateSummary();
    }

    function toggleAll(checked) {
      selectedKeys.clear();
    
      if (checked) {
        members
          .filter(m => m.lineUserId)
          .forEach(m => selectedKeys.add(m.lineUserId));
      }
    
      renderMembers();
    }

    function clearSelected() {
      selectedKeys.clear();
      renderMembers();
    }

    async function sendSelectedCoupons() {
      if (!members.length) return showToast('請先查詢會員');
      if (!selectedKeys.size) return showToast('請先勾選要發送的會員');
      if (!val('message')) return showToast('請輸入優惠訊息');
      if (!val('redeemUrl')) return showToast('請輸入兌換頁網址 / LIFF URL');

      if (!confirm('確定要發送給 ' + selectedKeys.size + ' 位會員嗎？')) return;

      saveSettings();

      const memberKeys = Array.from(selectedKeys).join(',');
      const extra = {
        memberKeys,
        message: val('message'),
        couponTitle: val('couponTitle'),
        buttonLabel: val('buttonLabel'),
        redeemUrl: val('redeemUrl'),
        expireText: val('expireText')
      };

      try {
        showToast('發送中...');
        const url = val('apiUrl') + '?' + buildQuery('sendCouponToMembers', extra);
        const data = await jsonp(url);
        if (data.status === 'success') {
          showToast('發送完成：成功 ' + (data.successCount || 0) + '，失敗 ' + (data.failCount || 0));
        } else {
          showToast(data.message || '發送失敗');
        }
      } catch (error) {
        showToast('發送失敗：' + error.message);
      }
    }

    function updateSummary() {
      const lineReady = members.filter(m => m.lineUserId).length;
      const avg = members.length ? Math.round(members.reduce((sum, m) => sum + m.totalAmount, 0) / members.length) : 0;
      document.getElementById('targetCount').textContent = members.length;
      document.getElementById('selectedCount').textContent = selectedKeys.size;
      document.getElementById('lineReadyCount').textContent = lineReady;
      document.getElementById('averageAmount').textContent = formatNumber(avg);
    }

    function val(id) {
      return document.getElementById(id).value.trim();
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2300);
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString('zh-TW');
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeJs(value) {
      return String(value ?? '')
        .replaceAll('\\', '\\\\')
        .replaceAll("'", "\\'")
        .replaceAll('"', '\\"')
        .replaceAll('\n', '\\n')
        .replaceAll('\r', '');
    }

    init();
  </script>
</body>
</html>
